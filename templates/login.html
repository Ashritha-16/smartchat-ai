<!DOCTYPE html>
<html>

<head>
    <title>Sign in</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=999">
</head>

<body class="auth-page login-bg">

    <!-- LEFT INFO SECTION -->
    <div class="welcome-section">

        <h1>Continue your AI experience</h1>

        <p>
            Sign in to access your AI Chatbot and keep exploring.
        </p>

    </div>

    <!-- LOGIN BOX -->
    <div class="auth-box">

        <h2>Sign in</h2>

        <!-- FLASH MESSAGES -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p style="color:red;">
                    {{ messages[0] }}
                </p>
            {% endif %}
        {% endwith %}

        <!-- LOGIN FORM -->
        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Sign in
            </button>

        </form>

        <!-- REGISTER LINK -->
        <p>
            Don't have an account?
            <a href="/register">Sign up</a>
        </p>

    </div>

</body>
</html>
